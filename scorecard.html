<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NH | Snooker Scorecard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        /* Custom styles specifically for the scorecard interface */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        /* Transparent text fields for names */
        .player-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px dashed #475569;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 85%;
            margin-bottom: 5px;
        }
        .player-name-input:focus {
            outline: none;
            border-bottom-color: #38bdf8;
        }

        .player-score {
            font-size: 3rem;
            font-weight: bold;
            color: #38bdf8;
            margin: 5px 0;
        }

        /* Automated clean frame display row */
        .frame-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .break-tracker {
            text-align: center;
            background: #0f172a;
            padding: 10px;
            border-radius: 4px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #94a3b8;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .ball-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ball-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            color: #fff;
            transition: transform 0.1s ease;
        }
        .ball-btn:active { transform: scale(0.95); }
        
        /* Snooker Ball Colors */
        .red { background-color: #dc2626; }
        .yellow { background-color: #eab308; color: #000; }
        .green { background-color: #15803d; }
        .brown { background-color: #78350f; }
        .blue { background-color: #2563eb; }
        .pink { background-color: #db2777; }
        .black { background-color: #000; border: 1px solid #334155; }
        
        /* Inline split foul group setup */
        .foul-group {
            display: flex;
            gap: 10px;
        }
        .foul-group .ball-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background-color: #475569;
        }
        
        .action-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .action-btn {
            background-color: #0284c7;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            flex: 1;
        }
        .reset-match-btn {
            background-color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <script src="nav.js"></script>
        <main>
            <!-- Scoreboard Display -->
            <div class="scoreboard">
                <div>
                    <!-- Editable Name Fields -->
                    <input type="text" id="p1-name" class="player-name-input" value="Player 1" oninput="syncActionLabels()">
                    <div class="player-score" id="p1-display">0</div>
                    
                    <!-- Clean Auto Frame Display -->
                    <div class="frame-counter">
                        <span>Frames: <strong id="p1-frames" style="color: white;">0</strong></span>
                    </div>
                </div>
                <div>
                    <!-- Editable Name Fields -->
                    <input type="text" id="p2-name" class="player-name-input" value="Player 2" oninput="syncActionLabels()">
                    <div class="player-score" id="p2-display">0</div>
                    
                    <!-- Clean Auto Frame Display -->
                    <div class="frame-counter">
                        <span>Frames: <strong id="p2-frames" style="color: white;">0</strong></span>
                    </div>
                </div>
            </div>

            <!-- Live Break Tracker -->
            <div class="break-tracker">
                Current Break: <span id="current-break" style="color: #38bdf8; font-weight: bold;">0</span>
            </div>

            <!-- Scoring Controls -->
            <div class="controls-grid">
                <!-- Player 1 Column -->
                <div class="ball-buttons">
                    <h4 id="p1-action-header">Player 1 Actions</h4>
                    <button class="ball-btn red" onclick="addScore(1, 1)">Red (1)</button>
                    <button class="ball-btn yellow" onclick="addScore(1, 2)">Yellow (2)</button>
                    <button class="ball-btn green" onclick="addScore(1, 3)">Green (3)</button>
                    <button class="ball-btn brown" onclick="addScore(1, 4)">Brown (4)</button>
                    <button class="ball-btn blue" onclick="addScore(1, 5)">Blue (5)</button>
                    <button class="ball-btn pink" onclick="addScore(1, 6)">Pink (6)</button>
                    <button class="ball-btn black" onclick="addScore(1, 7)">Black (7)</button>
                    
                    <!-- Variable Foul Row -->
                    <div class="foul-group">
                        <button class="ball-btn" onclick="foul(1, 4)">4</button>
                        <button class="ball-btn" onclick="foul(1, 5)">5</button>
                        <button class="ball-btn" onclick="foul(1, 6)">6</button>
                        <button class="ball-btn" onclick="foul(1, 7)">7</button>
                    </div>
                </div>

                <!-- Player 2 Column -->
                <div class="ball-buttons">
                    <h4 id="p2-action-header">Player 2 Actions</h4>
                    <button class="ball-btn red" onclick="addScore(2, 1)">Red (1)</button>
                    <button class="ball-btn yellow" onclick="addScore(2, 2)">Yellow (2)</button>
                    <button class="ball-btn green" onclick="addScore(2, 3)">Green (3)</button>
                    <button class="ball-btn brown" onclick="addScore(2, 4)">Brown (4)</button>
                    <button class="ball-btn blue" onclick="addScore(2, 5)">Blue (5)</button>
                    <button class="ball-btn pink" onclick="addScore(2, 6)">Pink (6)</button>
                    <button class="ball-btn black" onclick="addScore(2, 7)">Black (7)</button>
                    
                    <!-- Variable Foul Row -->
                    <div class="foul-group">
                        <button class="ball-btn" onclick="foul(2, 4)">4</button>
                        <button class="ball-btn" onclick="foul(2, 5)">5</button>
                        <button class="ball-btn" onclick="foul(2, 6)">6</button>
                        <button class="ball-btn" onclick="foul(2, 7)">7</button>
                    </div>
                </div>
            </div>

            <div class="action-container">
                <button class="action-btn" onclick="endFrame()">End Frame</button>
                <button class="action-btn reset-match-btn" onclick="resetMatch()">Reset Match</button>
            </div>
        </main>
    </div>

    <!-- Scoring Engine Logic -->
    <script>
        let p1Score = 0;
        let p2Score = 0;
        let p1Frames = 0;
        let p2Frames = 0;
        let currentBreak = 0;
        let lastPlayer = 0;

        // Dynamic Label Syncer
        function syncActionLabels() {
            const name1 = document.getElementById('p1-name').value.trim() || "Player 1";
            const name2 = document.getElementById('p2-name').value.trim() || "Player 2";
            document.getElementById('p1-action-header').innerText = name1 + " Actions";
            document.getElementById('p2-action-header').innerText = name2 + " Actions";
        }

        function addScore(player, points) {
            if (lastPlayer !== 0 && lastPlayer !== player) {
                currentBreak = 0;
            }
            
            lastPlayer = player;
            currentBreak += points;

            if (player === 1) {
                p1Score += points;
                document.getElementById('p1-display').innerText = p1Score;
            } else {
                p2Score += points;
                document.getElementById('p2-display').innerText = p2Score;
            }
            
            document.getElementById('current-break').innerText = currentBreak;
        }

        // Updated dynamically targeted foul function
        function foul(foulingPlayer, penaltyPoints) {
            currentBreak = 0;
            document.getElementById('current-break').innerText = currentBreak;
            lastPlayer = 0;

            if (foulingPlayer === 1) {
                p2Score += penaltyPoints;
                document.getElementById('p2-display').innerText = p2Score;
            } else {
                p1Score += penaltyPoints;
                document.getElementById('p1-display').innerText = p1Score;
            }
        }

        // Frame update backend engine
        function adjustFrames(player, val) {
            if (player === 1) {
                p1Frames = Math.max(0, p1Frames + val);
                document.getElementById('p1-frames').innerText = p1Frames;
            } else {
                p2Frames = Math.max(0, p2Frames + val);
                document.getElementById('p2-frames').innerText = p2Frames;
            }
        }

        // Calculates winner, awards the frame, and safely prepares the table for the next frame
        function endFrame() {
            const name1 = document.getElementById('p1-name').value.trim() || "Player 1";
            const name2 = document.getElementById('p2-name').value.trim() || "Player 2";

            if (p1Score === 0 && p2Score === 0) {
                alert("No scores have been recorded for this frame yet.");
                return;
            }

            let winnerName = "";
            let winningPlayerNumber = 0;

            if (p1Score > p2Score) {
                winnerName = name1;
                winningPlayerNumber = 1;
            } else if (p2Score > p1Score) {
                winnerName = name2;
                winningPlayerNumber = 2;
            } else {
                alert("The score is currently a tie! Resolve the tie breaker (re-spotted black) before ending the frame.");
                return;
            }

            if (confirm(`End this frame and automatically award it to ${winnerName}?`)) {
                adjustFrames(winningPlayerNumber, 1);
                
                p1Score = 0;
                p2Score = 0;
                currentBreak = 0;
                lastPlayer = 0;
                document.getElementById('p1-display').innerText = 0;
                document.getElementById('p2-display').innerText = 0;
                document.getElementById('current-break').innerText = 0;
            }
        }

        // Wipe clean including total match metrics
        function resetMatch() {
            if (confirm("Are you sure you want to reset the full match metrics?")) {
                p1Score = 0;
                p2Score = 0;
                p1Frames = 0;
                p2Frames = 0;
                currentBreak = 0;
                lastPlayer = 0;
                document.getElementById('p1-display').innerText = 0;
                document.getElementById('p2-display').innerText = 0;
                document.getElementById('current-break').innerText = 0;
                document.getElementById('p1-frames').innerText = 0;
                document.getElementById('p2-frames').innerText = 0;
                document.getElementById('p1-name').value = "Player 1";
                document.getElementById('p2-name').value = "Player 2";
                syncActionLabels();
            }
        }
    </script>
</body>
</html>
